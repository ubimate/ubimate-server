# nginx reverse proxy for ubimate-server
#
# Replace `your-server.example.com` with your actual domain.
# Assumes certbot has already obtained a certificate for the domain.
# Obtain with: sudo certbot --nginx -d your-server.example.com
#
# The map block below handles WebSocket Connection header upgrade/close.
# Put it in the http {} block of /etc/nginx/nginx.conf if not already present.
#
#   map $http_upgrade $connection_upgrade {
#       default upgrade;
#       ''      close;
#   }

server {
    listen 80;
    server_name your-server.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name your-server.example.com;

    ssl_certificate     /etc/letsencrypt/live/your-server.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-server.example.com/privkey.pem;

    # REST API + WebSocket (/yjs) — both on the same upstream port
    location / {
        proxy_pass         http://localhost:3001;
        proxy_http_version 1.1;

        # Required for WebSocket upgrade (used by the /yjs Hocuspocus endpoint)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep WebSocket connections alive (real-time collab sessions can be long)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
